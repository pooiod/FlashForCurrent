<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Downloads - FlashForCurrent</title>
    <link href="https://fonts.googleapis.com/css2?family=Trebuchet+MS:wght@400;700&family=Verdana:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            scrollbar-color: #aab4c2 #e5ebf1;
        }

        #page-wrapper {
            position: relative;
            width: 100%;
            min-height: 100vh;
            font-family: 'Trebuchet MS', Verdana, sans-serif;
            color: #1a202c;
            background: radial-gradient(circle at 50% 0%, #ffffff 0%, #cbd5e0 70%, #a0aec0 100%);
            background-attachment: scroll;
            background-size: cover;
            background-repeat: no-repeat;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .decor-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .vector-swoosh {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.8) 0%, rgba(255, 255, 255, 0) 100%);
            box-shadow: inset 0 0 80px rgba(255, 255, 255, 0.6);
        }

        .swoosh-1 {
            width: 140vw;
            height: 1200px;
            top: -600px;
            left: -20vw;
            transform: scaleY(0.3) rotate(-10deg);
        }

        main {
            position: relative;
            z-index: 10;
            padding: 30px 20px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .h-flash {
            color: #0f172a;
            text-shadow: 1px 1px 0px #fff, 2px 4px 15px rgba(0, 0, 0, 0.1);
            letter-spacing: -2px;
            font-weight: bold;
            margin-bottom: 40px;
            font-size: 4rem;
            text-align: center;
        }

        .download-list {
            background: linear-gradient(to bottom, #ffffff 0%, #f8fafc 100%);
            border: 1px solid #ffffff;
            border-bottom: 3px solid #94a3b8;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            width: 100%;
            overflow: hidden;
        }

        .download-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 40px;
            border-bottom: 1px solid #e2e8f0;
        }

        .download-item:last-child {
            border-bottom: none;
        }

        .download-info h3 {
            margin: 0 0 5px 0;
            font-size: 1.4rem;
            color: #1e5799;
        }

        .download-info p {
            margin: 0;
            color: #64748b;
            font-size: 0.95rem;
        }

        .flash-pill-btn {
            display: inline-block;
            background: linear-gradient(to bottom, #6eb4f2 0%, #1e5799 50%, #133d6b 100%);
            border: 1px solid #0a2644;
            border-radius: 35px;
            padding: 12px 28px;
            color: #ffffff;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            text-shadow: 0 -1px 1px rgba(0, 0, 0, 0.8);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5), 0 6px 12px rgba(0, 0, 0, 0.15);
            transition: transform 0.1s;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .flash-pill-btn:active {
            transform: translateY(2px);
        }

        .btn-alt {
            background: linear-gradient(to bottom, #f8fafc 0%, #e2e8f0 100%);
            color: #1e5799;
            border: 1px solid #cbd5e0;
            text-shadow: none;
        }

        .req-notice {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid #cbd5e0;
            border-radius: 12px;
            font-size: 0.9rem;
            color: #475569;
            text-align: center;
        }

        #helper-popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .popup-content {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid #fff;
        }

        .popup-content h2 {
            margin-top: 0;
            color: #0f172a;
        }

        .popup-actions {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .unable {
            background: linear-gradient(to bottom, #dddee0 0%, #c2c7ce 100%);
            color: #1e5799;
            border: 1px solid #cbd5e0;
            cursor: not-allowed;
            text-shadow: none;
        }
    </style>
</head>

<body>
    <div id="page-wrapper">
        <div class="decor-container">
            <div class="vector-swoosh swoosh-1"></div>
        </div>

        <main>
            <h1 class="h-flash">Extensions</h1>

            <div class="download-list">
                <div class="download-item">
                    <div class="download-info">
                        <h3>Chrome</h3>
                    </div>
                    <div class="download-actions">
                        <button onclick="downloadItem('')" class="flash-pill-btn btn-alt unable">Open chrome web store</button>
                    </div>
                </div>

                <div class="download-item">
                    <div class="download-info">
                        <h3>Firefox</h3>
                    </div>
                    <div class="download-actions">
                        <button onclick="downloadItem('')" class="flash-pill-btn btn-alt unable">Open firefox addon page</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function downloadItem(url) {
            window.location.href = url;
        }
    </script>
</body>
</html>
