<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Test</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0c0c0c;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #flash-content {
            width: 100vw;
            height: 100vh;
        }

        embed, object {
            width: 100%;
            height: 100%;
            outline: none;
        }
    </style>
</head>
<body>
    <div id="flash-content">
        <embed 
            src="/Working.swf" 
            type="application/x-shockwave-flash" 
            quality="high" 
            allowScriptAccess="always" 
            allowFullScreen="true"
            wmode="direct">
    </div>
</body>
</html>
